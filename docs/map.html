<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>同光 AI 世界地图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700;900&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0a1020;
  --bg-2:        #101b33;
  --bg-3:        #1c2a4a;
  --ink:         #f2f6fc;
  --ink-2:       #c9d5e8;
  --ink-3:       #94a6c4;
  --ink-4:       #7e90b0;
  --accent:      #e2c07e;
  --accent-2:    #33d6c5;
  --line:        #2f4166;
  --line-2:      #24344c;

  --layer-l1: #b794f6;
  --layer-l2: #7ab8ff;
  --layer-l3: #4ade80;
  --layer-l4: #e2c07e;

  --layer-l1-bg: rgba(183,148,246,.10);
  --layer-l2-bg: rgba(122,184,255,.10);
  --layer-l3-bg: rgba(74,222,128,.10);
  --layer-l4-bg: rgba(226,192,126,.10);

  --layer-l1-border: rgba(183,148,246,.32);
  --layer-l2-border: rgba(122,184,255,.32);
  --layer-l3-border: rgba(74,222,128,.32);
  --layer-l4-border: rgba(226,192,126,.32);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:    #0a1020;
    --bg-2:  #101b33;
    --bg-3:  #1c2a4a;
    --ink:   #f2f6fc;
    --ink-2: #c9d5e8;
    --ink-3: #94a6c4;
    --ink-4: #7e90b0;
    --line:   #2f4166;
    --line-2: #24344c;
    --accent:  #e2c07e;
    --layer-l1: #b794f6;
    --layer-l2: #7ab8ff;
    --layer-l3: #4ade80;
    --layer-l4: #e2c07e;
    --layer-l1-bg: rgba(183,148,246,.10);
    --layer-l2-bg: rgba(122,184,255,.10);
    --layer-l3-bg: rgba(74,222,128,.10);
    --layer-l4-bg: rgba(226,192,126,.10);
    --layer-l1-border: rgba(183,148,246,.32);
    --layer-l2-border: rgba(122,184,255,.32);
    --layer-l3-border: rgba(74,222,128,.32);
    --layer-l4-border: rgba(226,192,126,.32);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px 40px; }

/* Top bar (像 index.html) */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 0 14px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--line);
}
.brand {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 1.4rem;
  color: var(--ink);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 8px;
}
.brand .pin {
  display: inline-block;
  width: 7px; height: 7px;
  background: var(--accent);
  border-radius: 50%;
}
.brand .sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.68rem;
  color: var(--ink-3);
  font-weight: 400;
  margin-left: 4px;
}
.topbar-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}
.tab-link {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  padding: 5px 12px;
  border-radius: 6px;
  text-decoration: none;
  color: var(--ink-2);
  border: 1px solid var(--line);
  background: var(--bg-2);
  transition: all 0.15s;
}
.tab-link:hover {
  background: var(--bg-3);
  color: var(--ink);
}
.tab-link.active {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

/* Page title */
.page-title {
  text-align: center;
  margin: 28px 0 6px;
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 1.7rem;
  color: var(--ink);
  letter-spacing: -0.5px;
}
.page-subtitle {
  text-align: center;
  font-size: 13px;
  color: var(--ink-3);
}
.page-meta {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-4);
  margin: 6px 0 24px;
}

/* View Tabs (4 视图切换) */
.view-tabs {
  display: flex;
  gap: 4px;
  background: var(--bg-2);
  padding: 4px;
  border-radius: 8px;
  margin: 0 auto 24px;
  max-width: 720px;
  border: 1px solid var(--line);
}
.view-tab {
  flex: 1;
  padding: 9px 14px;
  background: transparent;
  border: none;
  border-radius: 6px;
  font-family: inherit;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--ink-2);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.view-tab:hover { background: rgba(0,0,0,0.04); color: var(--ink); }
.view-tab.active {
  background: var(--ink);
  color: var(--bg);
}

/* View container */
.view {
  display: none;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 24px;
}
.view.active { display: block; }

/* Layer card */
.layer {
  margin-bottom: 18px;
  padding: 14px 18px;
  border-radius: 10px;
  border: 1px solid;
}
.layer-l1 { background: var(--layer-l1-bg); border-color: var(--layer-l1-border); }
.layer-l2 { background: var(--layer-l2-bg); border-color: var(--layer-l2-border); }
.layer-l3 { background: var(--layer-l3-bg); border-color: var(--layer-l3-border); }
.layer-l4 { background: var(--layer-l4-bg); border-color: var(--layer-l4-border); }

.layer-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.layer-l1 .layer-title { color: var(--layer-l1); }
.layer-l2 .layer-title { color: var(--layer-l2); }
.layer-l3 .layer-title { color: var(--layer-l3); }
.layer-l4 .layer-title { color: var(--layer-l4); }

.layer-subtitle {
  font-size: 12px;
  color: var(--ink-3);
  margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
}

.row-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  margin: 12px 0 6px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Nodes */
.nodes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.node {
  padding: 6px 12px;
  background: var(--bg);
  border-radius: 6px;
  border: 1px solid;
  font-size: 12.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  color: var(--ink);
}
.node:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.node.l1 { border-color: var(--layer-l1-border); color: var(--layer-l1); }
.node.l1:hover { background: var(--layer-l1-bg); }
.node.l2 { border-color: var(--layer-l2-border); color: var(--layer-l2); }
.node.l2:hover { background: var(--layer-l2-bg); }
.node.l3 { border-color: var(--layer-l3-border); color: var(--layer-l3); }
.node.l3:hover { background: var(--layer-l3-bg); }
.node.l4 { border-color: var(--layer-l4-border); color: var(--layer-l4); }
.node.l4:hover { background: var(--layer-l4-bg); }

.node.hot {
  /* 恒暗色高亮节点(不随系统浅色模式变亮) */
  background: linear-gradient(180deg, var(--bg-2), rgba(226, 192, 126, 0.14));
  border-color: var(--accent);
  font-weight: 600;
}
.node.hot::after {
  content: '⭐';
  margin-left: 4px;
  font-size: 10px;
}
.node .meta {
  font-size: 9.5px;
  color: var(--ink-3);
  margin-left: 4px;
  font-weight: 400;
  font-family: 'JetBrains Mono', monospace;
}
.node .cn-flag { margin-right: 3px; }

/* China vs US */
.china-us-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.country-col {
  padding: 18px;
  border-radius: 10px;
  border: 1px solid;
}
.country-col.us {
  background: var(--layer-l2-bg);
  border-color: var(--layer-l2-border);
}
.country-col.cn {
  /* 恒暗色(不随系统浅色模式变亮):暗底 + 红调,与美国列(蓝调)对称 */
  background: rgba(220, 38, 38, 0.08);
  border-color: rgba(220, 38, 38, 0.3);
}
.country-col h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.15rem;
  margin-bottom: 10px;
  font-weight: 700;
}
.country-col.us h3 { color: var(--layer-l2); }
.country-col.cn h3 { color: #f87171; }

/* Hot events */
.event-card {
  /* 恒暗色卡片(全站暗色主题,不随系统浅色模式变亮):暗底 + 极淡金调 + 金色左边条标识"焦点" */
  background: linear-gradient(180deg, var(--bg-2), rgba(226, 192, 126, 0.05));
  border: 1px solid rgba(226, 192, 126, 0.28);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 12px;
}
.event-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
}
.event-meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  margin-bottom: 6px;
}
.event-impact { font-size: 13px; color: var(--ink-2); line-height: 1.65; }

/* Customer cards */
.customer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.customer-card {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px;
}
.industry-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  background: var(--bg-2);
  color: var(--ink-3);
  border-radius: 4px;
  margin-bottom: 6px;
}
.customer-card .name {
  font-family: 'Noto Serif SC', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}
.customer-card .uses {
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.6;
}
.customer-card .uses strong { color: var(--ink); }

/* 💡 洞察块(每层 layer 顶部) */
.insight-box {
  background: rgba(194, 65, 12, 0.05);
  border-left: 3px solid var(--accent);
  border-radius: 6px;
  padding: 12px 16px;
  margin: 8px 0 14px;
  font-size: 13px;
  line-height: 1.7;
}
@media (prefers-color-scheme: dark) {
  .insight-box {
    background: rgba(251, 146, 60, 0.08);
  }
}
.insight-box .insight-row {
  display: flex;
  gap: 10px;
  margin-bottom: 5px;
  align-items: flex-start;
}
.insight-box .insight-row:last-child { margin-bottom: 0; }
.insight-box .insight-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent);
  color: white;
  flex-shrink: 0;
  letter-spacing: 0.3px;
  white-space: nowrap;
  margin-top: 1px;
}
.insight-box .insight-tag.fact { background: var(--ink-3); }
.insight-box .insight-tag.trend { background: var(--layer-l3); }
.insight-box .insight-tag.action { background: var(--accent); }
.insight-box .insight-text {
  color: var(--ink);
  font-size: 13px;
}
.insight-box .insight-text strong {
  font-weight: 600;
  color: var(--ink);
}

/* 季度趋势条(用于洞察板块) */
.trend-bar {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  margin-left: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.trend-up { color: #16a34a; font-weight: 600; }
.trend-down { color: #dc2626; font-weight: 600; }
.trend-flat { color: var(--ink-3); }

/* 全局洞察板块(每个 view 顶部) */
.view-insight {
  background: linear-gradient(180deg, rgba(194, 65, 12, 0.04), transparent);
  border: 1px solid rgba(194, 65, 12, 0.2);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 20px;
}
@media (prefers-color-scheme: dark) {
  .view-insight {
    background: linear-gradient(180deg, rgba(251, 146, 60, 0.08), transparent);
    border-color: rgba(251, 146, 60, 0.2);
  }
}
.view-insight h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.view-insight p {
  font-size: 13px;
  color: var(--ink-2);
  line-height: 1.65;
  margin-bottom: 4px;
}
.view-insight p:last-child { margin-bottom: 0; }
.view-insight .quote {
  font-family: 'Noto Serif SC', serif;
  font-style: italic;
  font-size: 13px;
  color: var(--ink);
  border-left: 3px solid var(--accent);
  padding-left: 10px;
  margin: 8px 0;
}

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.55);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 26px;
  max-width: 500px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  position: relative;
}
.modal h3 {
  font-family: 'Noto Serif SC', serif;
  font-size: 1.4rem;
  margin-bottom: 8px;
  color: var(--ink);
}
.modal .tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 4px;
  background: var(--bg-2);
  color: var(--ink-2);
  margin-bottom: 12px;
}
.modal .desc {
  font-size: 13.5px;
  color: var(--ink-2);
  margin-bottom: 14px;
  line-height: 1.7;
}
.modal .stats {
  background: var(--bg-2);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 10px;
  border: 1px solid var(--line);
}
.modal .stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 12.5px;
  padding: 3px 0;
}
.modal .stat-row .label { color: var(--ink-3); }
.modal .stat-row .val {
  font-weight: 500;
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
}
.modal .close {
  position: absolute;
  top: 14px;
  right: 14px;
  background: none;
  border: none;
  font-size: 22px;
  cursor: pointer;
  color: var(--ink-3);
  line-height: 1;
}
.modal .close:hover { color: var(--ink); }

/* Legend */
.legend {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px dashed var(--line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

footer {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-4);
  margin-top: 28px;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
footer a { color: var(--accent); text-decoration: none; }

@media print {
  .topbar, .view-tabs { display: none; }
  .view { display: block !important; page-break-after: always; border: none; padding: 0; }
  body { background:#1c2a4a; }
}

@media (max-width: 768px) {
  .china-us-grid { grid-template-columns: 1fr; }
  .view-tabs { flex-wrap: wrap; }
  .topbar { flex-direction: column; gap: 12px; }
}
</style>
</head>
<body>
<div class="container">

<div class="topbar">
  <a href="./index.html" class="brand">
    <span class="pin"></span>
    <span>同光</span>
    <span class="sub">AI 早报</span>
  </a>
  <div class="topbar-actions">
    <a href="./index.html" class="tab-link">📚 阅读库</a>
    <a href="./weekly.html" class="tab-link">📅 每周深度</a>
    <a href="./map.html" class="tab-link active">🗺️ AI 地图</a>
    <a href="./stats.html" class="tab-link">📊 趋势</a>
  </div>
</div>

<h1 class="page-title">AI 世界地图</h1>
<div class="page-subtitle" id="page-subtitle">加载中…</div>
<div class="page-meta" id="page-meta">数据来源:同光·AI早报</div>

<nav class="view-tabs">
  <button class="view-tab active" onclick="switchView('overview', this)">🌐 全景视图</button>
  <button class="view-tab" onclick="switchView('china-us', this)">🇨🇳🇺🇸 中美对比</button>
  <button class="view-tab" onclick="switchView('hot-events', this)">🔥 近期焦点</button>
  <button class="view-tab" onclick="switchView('cases', this)">🏢 落地案例</button>
</nav>

<div class="view active" id="view-overview"><div style="text-align:center;color:var(--ink-3);padding:48px;">正在加载最新早报数据…</div></div>
<div class="view" id="view-china-us"></div>
<div class="view" id="view-hot-events"></div>
<div class="view" id="view-cases"></div>

<footer>
  © 2026 同光·AI早报 · 数据随早报每日自动更新 ·
  <a href="./index.html">返回阅读库</a> ·
  <a href="javascript:print()">打印此页</a>
</footer>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <button class="close" onclick="closeModal()">×</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
/* ===================================================================
   同光 AI 世界地图 —— 数据驱动版
   数据源: ./data/index.json(与"趋势"页同源,由 build_index.py 每日生成)
   四个视图全部按 tag_index.companies(真实提及数)与 articles 动态渲染,
   不再有任何硬编码的公司/日期,早报更新即地图更新。
   =================================================================== */

/* 公司 -> 产业链层/国别/标签。只归类"真正的 AI 产业玩家"。
   layer: l1 模型层 / l2 基础设施 / l3 应用层 / l4 落地层
   country: us 美 / cn 中 / other 其它 */
const CLASSIFY = {
  // —— l1 模型层 ——
  'Anthropic': {layer:'l1', country:'us',    tag:'模型层 · 美国'},
  'OpenAI':    {layer:'l1', country:'us',    tag:'模型层 · 美国'},
  'Google':    {layer:'l1', country:'us',    tag:'模型层 · 美国'},
  'DeepMind':  {layer:'l1', country:'us',    tag:'模型层 · 美国(英)'},
  'Meta':      {layer:'l1', country:'us',    tag:'模型层 · 美国'},
  'xAI':       {layer:'l1', country:'us',    tag:'模型层 · 美国'},
  'Mistral':   {layer:'l1', country:'other', tag:'模型层 · 法国'},
  'Mythos':    {layer:'l1', country:'us',    tag:'模型 · Anthropic'},
  'DeepSeek':  {layer:'l1', country:'cn',    tag:'模型层 · 中国'},
  '智谱':      {layer:'l1', country:'cn',    tag:'模型层 · 中国'},
  'Kimi':      {layer:'l1', country:'cn',    tag:'模型层 · 中国'},
  'Moonshot':  {layer:'l1', country:'cn',    tag:'模型层 · 中国'},
  '通义':      {layer:'l1', country:'cn',    tag:'模型 · 阿里'},
  '豆包':      {layer:'l1', country:'cn',    tag:'模型 · 字节'},
  '混元':      {layer:'l1', country:'cn',    tag:'模型 · 腾讯'},
  '百度':      {layer:'l1', country:'cn',    tag:'模型层 · 中国'},
  // —— l2 基础设施(芯片/算力/云) ——
  'NVIDIA':    {layer:'l2', country:'us',    tag:'算力 · 美国'},
  'AWS':       {layer:'l2', country:'us',    tag:'云 · 美国'},
  'Bedrock':   {layer:'l2', country:'us',    tag:'云平台 · AWS'},
  'Amazon':    {layer:'l2', country:'us',    tag:'云 · 美国'},
  'Microsoft': {layer:'l2', country:'us',    tag:'云 · 美国'},
  'Oracle':    {layer:'l2', country:'us',    tag:'云 · 美国'},
  'Broadcom':  {layer:'l2', country:'us',    tag:'芯片 · 美国'},
  'Micron':    {layer:'l2', country:'us',    tag:'存储 · 美国'},
  'Databricks':{layer:'l2', country:'us',    tag:'数据平台 · 美国'},
  'Snowflake': {layer:'l2', country:'us',    tag:'数据平台 · 美国'},
  '台积电':    {layer:'l2', country:'other', tag:'晶圆代工 · 台湾'},
  'TSMC':      {layer:'l2', country:'other', tag:'晶圆代工 · 台湾'},
  '阿里':      {layer:'l2', country:'cn',    tag:'云 · 中国'},
  '腾讯':      {layer:'l2', country:'cn',    tag:'云 · 中国'},
  '华为':      {layer:'l2', country:'cn',    tag:'芯片/云 · 中国'},
  // —— l3 应用层(Agent/平台/工具) ——
  'Salesforce':  {layer:'l3', country:'us',    tag:'Agent · 美国'},
  'Hugging Face':{layer:'l3', country:'us',    tag:'开源平台 · 美国'},
  'ServiceNow':  {layer:'l3', country:'us',    tag:'企业软件 · 美国'},
  'SAP':         {layer:'l3', country:'other', tag:'企业软件 · 德国'},
  'Apple':       {layer:'l3', country:'us',    tag:'端侧生态 · 美国'},
  '字节':        {layer:'l3', country:'cn',    tag:'应用生态 · 中国'},
  // —— l4 落地层(企业采用/咨询) ——
  'IBM':       {layer:'l4', country:'us', tag:'企业 IT · 美国'},
  'BCG':       {layer:'l4', country:'us', tag:'咨询 · 美国'},
  'Deloitte':  {layer:'l4', country:'us', tag:'咨询 · 美国'},
  'PwC':       {layer:'l4', country:'us', tag:'咨询 · 美国'},
  'McKinsey':  {layer:'l4', country:'us', tag:'咨询 · 美国'},
  'Accenture': {layer:'l4', country:'us', tag:'咨询 · 美国'},
};

/* 媒体/研究机构/个人观察者:是高频信源,但不是产业玩家,单列标注区分 */
const OBSERVERS = {
  'FT':'📰 媒体', 'Bloomberg':'📰 媒体', 'TechCrunch':'📰 媒体', 'Stratechery':'📰 媒体',
  'MIT':'🎓 研究', 'Stanford':'🎓 研究',
  'Simon Willison':'🧑 观察者', 'Gary Marcus':'🧑 观察者', 'Karpathy':'🧑 观察者', 'Dario Amodei':'🧑 高管',
};

/* 子串误匹配等噪声,显式排除(如 engineering 里的 "ring" 被误判成 Ring) */
const EXCLUDE = new Set(['Ring']);

const LAYER_META = {
  l1: {title:'① 模型层 · Foundation Models', sub:'// 谁在造"大脑"'},
  l2: {title:'② 基础设施 · 芯片 · 算力 · 云', sub:'// 谁在供"算力"'},
  l3: {title:'③ 应用层 · Agent · 平台 · 工具', sub:'// 谁在做"产品"'},
  l4: {title:'④ 落地层 · 企业采用 · 咨询', sub:'// 谁在"用"'},
};

let DATA = null;
let COUNTS = {};

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }
function cnt(name){ return COUNTS[name] || 0; }
function stripLead(s){ return String(s||'').replace(/^[:：\s]+/, ''); }

async function load(){
  try{
    const res = await fetch('./data/index.json?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    COUNTS = (DATA.tag_index && DATA.tag_index.companies) || {};
    // 剔除排除项
    EXCLUDE.forEach(function(k){ delete COUNTS[k]; });
    renderHeader();
    renderOverview();
    renderChinaUs();
    renderHotEvents();
    renderCases();
  }catch(e){
    document.getElementById('view-overview').innerHTML =
      '<div style="text-align:center;color:var(--down,#ff8080);padding:48px;">加载失败: ' + esc(e.message) +
      '<br><span style="color:var(--ink-3);font-size:12px;">请检查 ./data/index.json 是否存在</span></div>';
  }
}

function renderHeader(){
  const m = DATA.meta || {};
  const range = m.date_range || ['', ''];
  const players = Object.keys(CLASSIFY).filter(function(n){ return cnt(n) > 0; }).length;
  const reports = (DATA.reports || []).length;
  const total = m.total_articles || (DATA.articles || []).length;
  document.getElementById('page-subtitle').textContent =
    '产业链 4 层 · ' + players + ' 家核心玩家 · 数据实时取自早报';
  document.getElementById('page-meta').textContent =
    '数据来源:同光·AI早报 · 覆盖 ' + range[0] + ' → ' + range[1] + ' · ' +
    reports + ' 期 / ' + total + ' 篇 · 最后更新 ' + range[1];
}

function nodeHtml(name, layerCls, hot){
  const c = CLASSIFY[name];
  const flag = (c && c.country === 'cn') ? '<span class="cn-flag">🇨🇳</span>' : '';
  return '<div class="node ' + layerCls + (hot ? ' hot' : '') + '" data-name="' + esc(name) + '">' +
    flag + esc(name) + '<span class="meta">' + cnt(name) + '</span></div>';
}

function renderOverview(){
  const classified = Object.keys(CLASSIFY).filter(function(n){ return cnt(n) > 0; }).sort(function(a,b){ return cnt(b) - cnt(a); });
  const top3 = classified.slice(0,3).map(function(n){ return esc(n) + '(' + cnt(n) + ')'; }).join(' · ');
  const usModel = Object.keys(CLASSIFY).filter(function(n){ return CLASSIFY[n].layer === 'l1' && CLASSIFY[n].country === 'us'; }).reduce(function(s,n){ return s + cnt(n); }, 0);
  const cnModel = Object.keys(CLASSIFY).filter(function(n){ return CLASSIFY[n].layer === 'l1' && CLASSIFY[n].country === 'cn'; }).reduce(function(s,n){ return s + cnt(n); }, 0);

  let html = '<div class="view-insight"><h3>💡 全景视图 · 数据洞察</h3>' +
    '<p>本期共追踪 <strong>' + classified.length + '</strong> 家产业链玩家,报道最集中:' + top3 + '。</p>' +
    '<p>模型层中美报道量:美国阵营 <strong>' + usModel + '</strong> 次 vs 中国阵营 <strong>' + cnModel + '</strong> 次。</p>' +
    '<p class="quote">"钱花在造大脑的(模型)、供算力的(芯片云)、做产品的(应用)与真正用起来的(落地)——四层缺一不可。"</p></div>';

  ['l1','l2','l3','l4'].forEach(function(L){
    const meta = LAYER_META[L];
    const comps = Object.keys(CLASSIFY).filter(function(n){ return CLASSIFY[n].layer === L && cnt(n) > 0; }).sort(function(a,b){ return cnt(b) - cnt(a); });
    let nodes = comps.map(function(n, i){ return nodeHtml(n, L, i === 0); }).join('');
    if(!nodes) nodes = '<div style="color:var(--ink-3);font-size:12px;">本期无数据</div>';
    html += '<div class="layer layer-' + L + '"><div class="layer-title">' + meta.title + '</div>' +
      '<div class="layer-subtitle">' + meta.sub + '</div><div class="nodes">' + nodes + '</div></div>';
  });

  const obs = Object.keys(OBSERVERS).filter(function(n){ return cnt(n) > 0; }).sort(function(a,b){ return cnt(b) - cnt(a); });
  if(obs.length){
    const onodes = obs.map(function(n){
      return '<div class="node" style="border-color:var(--line);color:var(--ink-2)" data-name="' + esc(n) + '">' +
        esc(n) + '<span class="meta">' + cnt(n) + '</span></div>';
    }).join('');
    html += '<div class="layer" style="border-color:var(--line);background:var(--bg-2)">' +
      '<div class="layer-title" style="color:var(--ink-2)">📡 高频信源与观察者</div>' +
      '<div class="layer-subtitle">// 媒体 · 研究机构 · 个人观察者(非产业玩家,单列标注)</div>' +
      '<div class="nodes">' + onodes + '</div></div>';
  }

  // 兜底:高频出现但尚未归入产业链层的名词(未来新公司/新信源),避免被静默丢弃(当前分类已覆盖全部高频公司,此桶通常为空)
  const known = new Set(Object.keys(CLASSIFY).concat(Object.keys(OBSERVERS)));
  const pending = Object.keys(COUNTS).filter(function(n){ return !known.has(n) && cnt(n) >= 12; }).sort(function(a,b){ return cnt(b) - cnt(a); });
  if(pending.length){
    const pnodes = pending.map(function(n){
      return '<div class="node" style="border-color:var(--warn,#fbbf24);color:var(--warn,#fbbf24)" data-name="' + esc(n) + '">' +
        esc(n) + '<span class="meta">' + cnt(n) + '</span></div>';
    }).join('');
    html += '<div class="layer" style="border-color:var(--line);background:var(--bg-2)">' +
      '<div class="layer-title" style="color:var(--warn,#fbbf24)">🆕 待归类高频玩家</div>' +
      '<div class="layer-subtitle">// 近期高频出现但尚未归入产业链层,可能是新公司或新信源(下次维护补类)</div>' +
      '<div class="nodes">' + pnodes + '</div></div>';
  }
  document.getElementById('view-overview').innerHTML = html;
}

function renderChinaUs(){
  const layerName = {l1:'模型', l2:'算力/云', l3:'应用', l4:'落地'};
  const us = Object.keys(CLASSIFY).filter(function(n){ return CLASSIFY[n].country === 'us' && cnt(n) > 0; }).sort(function(a,b){ return cnt(b) - cnt(a); });
  const cn = Object.keys(CLASSIFY).filter(function(n){ return CLASSIFY[n].country === 'cn' && cnt(n) > 0; }).sort(function(a,b){ return cnt(b) - cnt(a); });
  const usTotal = us.reduce(function(s,n){ return s + cnt(n); }, 0);
  const cnTotal = cn.reduce(function(s,n){ return s + cnt(n); }, 0);
  function col(list){
    return list.map(function(n){
      const L = CLASSIFY[n].layer;
      return '<div class="node ' + L + '" data-name="' + esc(n) + '">' + esc(n) +
        '<span class="meta">' + layerName[L] + '·' + cnt(n) + '</span></div>';
    }).join('');
  }
  const ratio = cnTotal ? (usTotal / cnTotal).toFixed(1) : '—';
  let html = '<div class="view-insight"><h3>💡 中美对比 · 报道量</h3>' +
    '<p>美国阵营 <strong>' + us.length + '</strong> 家共 <strong>' + usTotal + '</strong> 次报道;' +
    '中国阵营 <strong>' + cn.length + '</strong> 家共 <strong>' + cnTotal + '</strong> 次。' +
    '美 : 中 报道量约 <strong>' + ratio + ' : 1</strong>(仅反映本站信源关注度,非市场份额)。</p></div>';
  html += '<div class="china-us-grid">' +
    '<div class="country-col us"><h3>🇺🇸 美国 · ' + usTotal + ' 次</h3><div class="nodes">' + col(us) + '</div></div>' +
    '<div class="country-col cn"><h3>🇨🇳 中国 · ' + cnTotal + ' 次</h3><div class="nodes">' + col(cn) + '</div></div></div>';
  document.getElementById('view-china-us').innerHTML = html;
}

function renderHotEvents(){
  const t5 = (DATA.articles || []).filter(function(a){ return a.is_top5; })
    .sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); }).slice(0, 12);
  const span = t5.length ? (t5[t5.length-1].date + ' 至 ' + t5[0].date) : '';
  let html = '<div class="view-insight"><h3>🔥 近期焦点 · 每日 Top 5 精选</h3>' +
    '<p>下列为最近 ' + span + ' 早报评出的重磅事件,点标题看原文。</p></div>';
  if(!t5.length) html += '<div style="color:var(--ink-3);padding:20px;">暂无数据</div>';
  t5.forEach(function(a){
    const link = a.url
      ? '<a href="' + esc(a.url) + '" target="_blank" rel="noopener" style="color:inherit;text-decoration:none">' + esc(a.title) + '</a>'
      : esc(a.title);
    const meaning = a.meaning ? '<div class="event-impact">📌 ' + esc(stripLead(a.meaning)) + '</div>' : '';
    html += '<div class="event-card"><div class="event-title">' + link + '</div>' +
      '<div class="event-meta">' + esc(a.date) + ' · 质量分 ' + esc(a.quality_score != null ? a.quality_score : '—') + '</div>' +
      meaning + '</div>';
  });
  document.getElementById('view-hot-events').innerHTML = html;
}

function renderCases(){
  const cases = (DATA.articles || []).filter(function(a){ return a.dimension && a.dimension.indexOf('案例') >= 0; })
    .sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); }).slice(0, 12);
  let html = '<div class="view-insight"><h3>💡 落地案例 · 企业怎么用 AI</h3>' +
    '<p>取自早报「🏢 案例」维度最近 <strong>' + cases.length + '</strong> 条真实企业落地报道,点标题看原文。</p></div>';
  html += '<div class="customer-grid">';
  if(!cases.length) html += '<div style="color:var(--ink-3);padding:20px;">暂无数据</div>';
  cases.forEach(function(a){
    const link = a.url
      ? '<a href="' + esc(a.url) + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">' + esc(a.title) + '</a>'
      : esc(a.title);
    let body = stripLead(a.meaning) || esc(a.summary || '');
    body = esc(body);
    if(body.length > 150) body = body.slice(0, 150) + '…';
    html += '<div class="customer-card"><span class="industry-tag">' + esc(a.date) + '</span>' +
      '<div class="name" style="font-size:13.5px;line-height:1.45;margin-bottom:8px;">' + link + '</div>' +
      '<div class="uses">' + body + '</div></div>';
  });
  html += '</div>';
  document.getElementById('view-cases').innerHTML = html;
}

function show(name){
  const info = CLASSIFY[name];
  const obs = OBSERVERS[name];
  const tag = info ? info.tag : (obs ? obs + ' · 观察者/信源' : '点击查看');
  const count = cnt(name);
  const arts = (DATA.articles || []).filter(function(a){ return Array.isArray(a.companies) && a.companies.indexOf(name) >= 0; })
    .sort(function(a,b){ return String(b.date||'').localeCompare(String(a.date||'')); }).slice(0, 3);

  let html = '<h3>' + esc(name) + '</h3><span class="tag">' + esc(tag) + '</span>';
  html += '<div class="stats"><div class="stat-row"><span class="label">早报累计提及</span><span class="val">' + count + ' 次</span></div>';
  if(arts.length) html += '<div class="stat-row"><span class="label">最近出现</span><span class="val">' + esc(arts[0].date) + '</span></div>';
  html += '</div>';
  if(arts.length){
    html += '<div class="desc"><strong style="color:var(--ink)">📰 最近报道</strong></div>';
    arts.forEach(function(a){
      const link = a.url
        ? '<a href="' + esc(a.url) + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">' + esc(a.title) + '</a>'
        : esc(a.title);
      html += '<div style="font-size:12.5px;color:var(--ink-2);margin-bottom:8px;line-height:1.55;border-left:2px solid var(--line);padding-left:10px;">' +
        '<span style="font-family:monospace;font-size:10.5px;color:var(--ink-3)">' + esc(a.date) + '</span><br>' + link + '</div>';
    });
  }else{
    html += '<div class="desc">该玩家近期无独立报道条目。</div>';
  }
  html += '<p style="font-size:11.5px;color:var(--ink-3);margin-top:10px;">💡 完整报道见 <a href="./index.html" style="color:var(--accent);">同光·AI早报阅读库</a></p>';
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal').classList.add('show');
}

function closeModal(){ document.getElementById('modal').classList.remove('show'); }

function switchView(name, btn){
  document.querySelectorAll('.view').forEach(function(v){ v.classList.remove('active'); });
  document.querySelectorAll('.view-tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('view-' + name).classList.add('active');
  btn.classList.add('active');
}

// 事件委托:点节点弹窗(避免内联 onclick 的引号转义问题)
document.addEventListener('click', function(e){
  const node = e.target.closest ? e.target.closest('.node[data-name]') : null;
  if(node) show(node.getAttribute('data-name'));
});
document.addEventListener('keydown', function(e){ if(e.key === 'Escape') closeModal(); });

load();
</script>

</body>
</html>
